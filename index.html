<title>PR Queue · HumandDev</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:            #0B0E14;
  --surface:       #131720;
  --surface-hover: #181F2E;
  --border:        #1E2838;
  --border-hover:  #2A3B50;
  --text:          #C9D4E0;
  --muted:         #4F6070;
  --green:         #34D399;
  --amber:         #FBBF24;
  --red:           #F87171;
  --accent:        #60A5FA;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', ui-monospace, monospace;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

.app {
  max-width: 800px;
  margin: 0 auto;
  padding: 32px 16px 80px;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  gap: 12px;
}

.header h1 {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
}
.header-dot.live { background: var(--green); animation: pulse 2s ease infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-meta {
  font-size: 12px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

#week-score { position: relative; }

.score-pop {
  position: absolute;
  left: 50%;
  bottom: 100%;
  margin-bottom: 8px;
  font-weight: 700;
  font-size: 13px;
  color: var(--green);
  pointer-events: none;
  white-space: nowrap;
  z-index: 5;
  animation: scoreFall 8s ease-out forwards;
}

.score-pop-spin {
  display: inline-block;
  animation: scoreWobble 8s linear forwards;
}

/* Fall: single long segment (15%→100%) so the deceleration curve is
   continuous instead of re-triggering ease-out at every keyframe stop
   (which looked like a caterpillar crawl). */
@keyframes scoreFall {
  0%   { opacity: 0; transform: translateX(-50%) translateY(0)    scale(0.4); }
  10%  { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1.15); }
  15%  {             transform: translateX(-50%) translateY(0)    scale(1); }
  60%  { opacity: 0.5; }
  100% { opacity: 0; transform: translateX(-50%) translateY(600px) scale(0.85); }
}

/* Wobble: evenly-spaced/equal-amplitude stops = constant angular speed,
   then amplitude tapers gradually over the last third instead of cutting off. */
@keyframes scoreWobble {
  0%   { transform: rotate(0deg); }
  8%   { transform: rotate(8deg); }
  16%  { transform: rotate(-8deg); }
  24%  { transform: rotate(8deg); }
  32%  { transform: rotate(-8deg); }
  40%  { transform: rotate(8deg); }
  48%  { transform: rotate(-8deg); }
  56%  { transform: rotate(8deg); }
  64%  { transform: rotate(-8deg); }
  72%  { transform: rotate(6deg); }
  80%  { transform: rotate(-4deg); }
  88%  { transform: rotate(2deg); }
  95%  { transform: rotate(-1deg); }
  100% { transform: rotate(0deg); }
}

/* ── Auth section ── */
.auth-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 20px;
}

.auth-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 8px;
}

.auth-row { display: flex; gap: 8px; }

.auth-hint { margin-top: 8px; font-size: 12px; color: var(--muted); }
.auth-hint a { color: var(--accent); text-decoration: none; }
.auth-hint a:hover { text-decoration: underline; }

/* shared input used in config */
.input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 12px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}
.input:focus { border-color: var(--accent); }

.hint {
  margin-top: 8px;
  font-size: 12px;
  color: var(--muted);
}
.hint code {
  font-family: var(--mono);
  color: var(--text);
  background: var(--bg);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 11px;
}

/* ── Config section ── */
.config-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.config-field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 6px;
}

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
  text-decoration: none;
  white-space: nowrap;
  font-family: var(--font);
}

.btn-primary {
  background: var(--accent);
  color: #0B0E14;
}
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border-color: var(--border);
}
.btn-ghost:hover { color: var(--text); border-color: var(--border-hover); }
.btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-sm { padding: 4px 10px; font-size: 12px; }

.text-btn {
  background: none;
  border: none;
  padding: 0;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  font-family: var(--font);
  transition: color 0.15s;
}
.text-btn:hover { color: var(--text); }

/* ── Toolbar ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.toolbar-right {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
}

.toggle-label {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  user-select: none;
}
.toggle-label:hover { color: var(--text); }

.toggle-label input[type=checkbox] {
  width: 28px;
  height: 16px;
  appearance: none;
  background: var(--border);
  border-radius: 8px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle-label input[type=checkbox]:checked { background: var(--accent); }
.toggle-label input[type=checkbox]::after {
  content: '';
  position: absolute;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #fff;
  top: 2px;
  left: 2px;
  transition: transform 0.18s;
}
.toggle-label input[type=checkbox]:checked::after { transform: translateX(12px); }

/* ── Progress ── */
.progress-bar {
  height: 2px;
  background: transparent;
  border-radius: 1px;
  margin-bottom: 16px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 1px;
  transition: width 0.25s ease;
}

/* ── Section label ── */
.section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 8px;
  margin-top: 20px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-label:first-child { margin-top: 0; }

.count-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  border-radius: 9px;
  font-size: 11px;
  font-weight: 600;
  background: var(--border);
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}
.count-badge.ready { background: rgba(52,211,153,0.14); color: var(--green); }

/* ── Quick wins ── */
.quick-wins-section {
  border: 1px solid rgba(251,191,36,0.2);
  border-radius: 8px;
  padding: 12px 14px 6px;
  margin-bottom: 8px;
  background: rgba(251,191,36,0.025);
}
.quick-wins-section .section-label {
  color: rgba(251,191,36,0.6);
  margin-top: 0;
}
.quick-wins-section .pr-card {
  background: transparent;
  border-color: rgba(251,191,36,0.08);
}
.quick-wins-section .pr-card:hover {
  background: rgba(251,191,36,0.04);
  border-color: rgba(251,191,36,0.18);
}

/* ── PR Card ── */
.pr-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 6px;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
}
.pr-card:hover { border-color: var(--border-hover); background: var(--surface-hover); }
.pr-card.is-ignored { opacity: 0.35; }
.pr-card.is-stale   { opacity: 0.45; pointer-events: none; }
.pr-card.is-merged  { opacity: 0.55; }

.new-review-dot {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #FFB347;
  box-shadow: 0 0 6px 2px rgba(255,179,71,0.35);
  pointer-events: none;
}

.pr-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 7px;
}

.pr-repo {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  background: rgba(96,165,250,0.08);
  padding: 2px 7px;
  border-radius: 4px;
  border: 1px solid rgba(96,165,250,0.15);
  white-space: nowrap;
  flex-shrink: 0;
}

.pr-number {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  flex-shrink: 0;
}

.pr-badges {
  display: flex;
  gap: 5px;
  margin-left: auto;
  align-items: center;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 4px;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.badge-green { background: rgba(52,211,153,0.12); color: var(--green); }
.badge-amber { background: rgba(251,191,36,0.12);  color: var(--amber); }
.badge-red   { background: rgba(248,113,113,0.12); color: var(--red); }
.badge-gray  { background: rgba(79,96,112,0.18);   color: var(--muted); }
.badge-blue  { background: rgba(96,165,250,0.12);  color: var(--accent); }

.pr-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 10px;
  line-height: 1.4;
  text-wrap: balance;
}
.pr-title a { color: inherit; text-decoration: none; }
.pr-title a:hover { color: var(--accent); }

.pr-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  color: var(--muted);
  flex-wrap: wrap;
}

.pr-author {
  display: flex;
  align-items: center;
  gap: 5px;
}
.pr-author img {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  flex-shrink: 0;
}

.pr-actions {
  margin-left: auto;
  display: flex;
  gap: 6px;
}

/* ── Loading / empty / error ── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 40px;
  color: var(--muted);
  font-size: 13px;
}

@keyframes spin { to { transform: rotate(360deg); } }

@keyframes cardIn {
  0%   { opacity: 0; max-height: 0; margin-bottom: 0; padding-top: 0; padding-bottom: 0; }
  40%  { max-height: 160px; margin-bottom: 6px; padding-top: 14px; padding-bottom: 14px; opacity: 0; }
  100% { opacity: 1; max-height: 160px; margin-bottom: 6px; padding-top: 14px; padding-bottom: 14px; }
}
.pr-card.is-new {
  animation: cardIn 0.8s ease both;
  overflow: hidden;
}

.spinner {
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}

.empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.7;
}

.error-msg {
  background: rgba(248,113,113,0.07);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: 8px;
  padding: 14px 16px;
  color: var(--red);
  font-size: 13px;
  margin-bottom: 16px;
  line-height: 1.5;
}

/* ── Layout ── */
.main-layout {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 24px;
  align-items: start;
}
@media (max-width: 680px) { .main-layout { grid-template-columns: 1fr; } }

/* ── Own PRs panel ── */
.own-column-header {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}


#own-pr-list .pr-card { padding: 10px 12px; }
#own-pr-list .pr-title { font-size: 12px; margin-bottom: 6px; }
#own-pr-list .pr-repo  { font-size: 10px; }
#own-pr-list .pr-number { font-size: 10px; }
#own-pr-list .pr-meta  { font-size: 11px; }
#own-pr-list .badge    { font-size: 10px; padding: 1px 5px; }
#own-pr-list .btn-sm   { font-size: 11px; padding: 3px 8px; }
#own-pr-list .pr-author img { width: 14px; height: 14px; }

/* ── Tooltip ── */
#tip {
  position: fixed;
  background: #1E2838;
  color: var(--text);
  font-size: 11px;
  line-height: 1.4;
  padding: 5px 9px;
  border-radius: 5px;
  border: 1px solid #2A3B50;
  pointer-events: none;
  z-index: 9999;
  opacity: 0;
  max-width: 240px;
  white-space: normal;
  cursor: default;
  user-select: none;
}
#tip.visible { opacity: 1; }

[data-tip], .badge { cursor: default; user-select: none; }

.hidden { display: none !important; }

/* ── Tribe picker ── */
.tribe-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 2px;
}
.tribe-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 11px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  font-family: var(--font);
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.tribe-chip:hover { border-color: var(--border-hover); color: var(--text); }
.tribe-chip.selected { border-color: var(--tc); color: var(--tc); background: color-mix(in srgb, var(--tc) 10%, transparent); }
input.tribe-chip { cursor: text; outline: none; width: 72px; transition: border-color 0.15s, color 0.15s, width 0.2s; }
input.tribe-chip:focus, input.tribe-chip.selected { border-color: var(--accent); color: var(--text); width: 110px; }
.tribe-chip-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--tc);
  flex-shrink: 0;
}
</style>

<div id="tip"></div>
<div class="app">

  <!-- Header -->
  <div class="header">
    <h1>
      <span class="header-dot" id="status-dot"></span>
      PR Review Queue
    </h1>
    <div class="header-right">
      <span class="header-meta" id="week-score" style="display:none;cursor:default;transition:transform 0.15s;"></span>
      <span class="header-meta" id="last-updated"></span>
      <span class="header-meta hidden" id="logged-user" style="color:var(--muted)"></span>
      <button class="text-btn hidden" id="signout-btn" style="color:var(--muted)">Sign out</button>
      <button class="text-btn" id="config-toggle-btn">Config</button>
    </div>
  </div>

  <!-- Auth -->
  <div id="auth-section" class="auth-section">
    <span class="auth-label">GitHub Token</span>
    <div class="auth-row">
      <input type="password" id="token-input" class="input" placeholder="ghp_…" autocomplete="off" />
      <button class="btn btn-primary" id="save-token-btn">Connect</button>
    </div>
    <p class="auth-hint">
      Needs <code style="font-family:var(--mono);background:var(--bg);padding:1px 5px;border-radius:3px;font-size:11px;">repo</code> scope ·
      <a href="https://github.com/settings/tokens/new?scopes=repo&description=PR+Review+Queue" target="_blank" rel="noopener">Crear token →</a> ·
      se guarda en localStorage
    </p>
  </div>

  <!-- Config -->
  <div id="config-section" class="config-section hidden">
    <div class="config-field">
      <label>Org</label>
      <input type="text" id="cfg-org" class="input" value="HumandDev" />
    </div>
    <div class="config-field" style="grid-column:span 2;">
      <label>Tribu</label>
      <input type="hidden" id="cfg-label" />
      <div class="tribe-picker" id="tribe-picker"></div>
    </div>
    <div class="config-field">
      <label>Bot pattern (regex)</label>
      <input type="text" id="cfg-bots" class="input" value="hu-agent|hu-reviewer" />
    </div>
    <div class="config-field" style="grid-column:span 2; display:flex; justify-content:flex-end;">
      <button class="btn btn-primary btn-sm" id="config-save-btn">Save & refresh</button>
    </div>
  </div>

  <div class="main-layout">
  <div class="tribe-column">

  <!-- Toolbar -->
  <div id="toolbar" class="toolbar hidden">
    <label class="toggle-label">
      <input type="checkbox" id="ready-only-toggle" />
      Ready to review only
    </label>
    <label class="toggle-label">
      <input type="checkbox" id="show-ignored-toggle" checked />
      Show skipped
    </label>
    <div class="toolbar-right">
      <button class="btn btn-ghost btn-sm" id="refresh-btn">↺ Refresh</button>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-bar" id="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <!-- Error -->
  <div id="error-msg" class="error-msg hidden"></div>

  <!-- Loading -->
  <div id="loading" class="loading hidden">
    <div class="spinner"></div>
    <span id="loading-text">Loading PRs…</span>
  </div>

  <!-- PR list -->
  <div id="pr-list"></div>

  <!-- Empty -->
  <div id="empty" class="empty hidden">
    No hay PRs con label <code id="empty-label" style="font-family:var(--mono);font-size:11px;background:var(--surface);padding:1px 5px;border-radius:3px;"></code> abiertos en este momento.
  </div>

  </div><!-- /tribe-column -->

  <!-- Own PRs -->
  <div class="own-column" id="own-column" style="display:none">
    <div class="own-column-header">
      Mis PRs <span class="count-badge" id="own-count"></span>
    </div>
    <div id="own-loading" class="loading hidden" style="padding:20px;font-size:12px;">
      <div class="spinner"></div>
    </div>
    <div id="own-pr-list"></div>
    <div id="own-empty" class="empty hidden" style="padding:20px;font-size:12px;">Sin PRs abiertos.</div>
  </div>

  </div><!-- /main-layout -->

</div>

<script src="state.js"></script>
<script src="github.js"></script>
<script src="score.js"></script>
