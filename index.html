<title>PR Queue · HumandDev</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:            #0B0E14;
  --surface:       #131720;
  --surface-hover: #181F2E;
  --border:        #1E2838;
  --border-hover:  #2A3B50;
  --text:          #C9D4E0;
  --muted:         #4F6070;
  --green:         #34D399;
  --amber:         #FBBF24;
  --red:           #F87171;
  --accent:        #60A5FA;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', ui-monospace, monospace;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

.app {
  max-width: 800px;
  margin: 0 auto;
  padding: 32px 16px 80px;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  gap: 12px;
}

.header h1 {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
}
.header-dot.live { background: var(--green); animation: pulse 2s ease infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-meta {
  font-size: 12px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

/* ── Auth section ── */
.auth-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 20px;
}

.auth-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 8px;
}

.auth-row { display: flex; gap: 8px; }

.auth-hint { margin-top: 8px; font-size: 12px; color: var(--muted); }
.auth-hint a { color: var(--accent); text-decoration: none; }
.auth-hint a:hover { text-decoration: underline; }

/* shared input used in config */
.input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 12px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}
.input:focus { border-color: var(--accent); }

.hint {
  margin-top: 8px;
  font-size: 12px;
  color: var(--muted);
}
.hint code {
  font-family: var(--mono);
  color: var(--text);
  background: var(--bg);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 11px;
}

/* ── Config section ── */
.config-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.config-field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 6px;
}

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
  text-decoration: none;
  white-space: nowrap;
  font-family: var(--font);
}

.btn-primary {
  background: var(--accent);
  color: #0B0E14;
}
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border-color: var(--border);
}
.btn-ghost:hover { color: var(--text); border-color: var(--border-hover); }
.btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-sm { padding: 4px 10px; font-size: 12px; }

.text-btn {
  background: none;
  border: none;
  padding: 0;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  font-family: var(--font);
  transition: color 0.15s;
}
.text-btn:hover { color: var(--text); }

/* ── Toolbar ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.toolbar-right {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
}

.toggle-label {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  user-select: none;
}
.toggle-label:hover { color: var(--text); }

.toggle-label input[type=checkbox] {
  width: 28px;
  height: 16px;
  appearance: none;
  background: var(--border);
  border-radius: 8px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle-label input[type=checkbox]:checked { background: var(--accent); }
.toggle-label input[type=checkbox]::after {
  content: '';
  position: absolute;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #fff;
  top: 2px;
  left: 2px;
  transition: transform 0.18s;
}
.toggle-label input[type=checkbox]:checked::after { transform: translateX(12px); }

/* ── Progress ── */
.progress-bar {
  height: 2px;
  background: transparent;
  border-radius: 1px;
  margin-bottom: 16px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 1px;
  transition: width 0.25s ease;
}

/* ── Section label ── */
.section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 8px;
  margin-top: 20px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-label:first-child { margin-top: 0; }

.count-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  border-radius: 9px;
  font-size: 11px;
  font-weight: 600;
  background: var(--border);
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}
.count-badge.ready { background: rgba(52,211,153,0.14); color: var(--green); }

/* ── Quick wins ── */
.quick-wins-section {
  border: 1px solid rgba(251,191,36,0.2);
  border-radius: 8px;
  padding: 12px 14px 6px;
  margin-bottom: 8px;
  background: rgba(251,191,36,0.025);
}
.quick-wins-section .section-label {
  color: rgba(251,191,36,0.6);
  margin-top: 0;
}
.quick-wins-section .pr-card {
  background: transparent;
  border-color: rgba(251,191,36,0.08);
}
.quick-wins-section .pr-card:hover {
  background: rgba(251,191,36,0.04);
  border-color: rgba(251,191,36,0.18);
}

/* ── PR Card ── */
.pr-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 6px;
  transition: border-color 0.15s, background 0.15s;
}
.pr-card:hover { border-color: var(--border-hover); background: var(--surface-hover); }
.pr-card.is-ignored { opacity: 0.35; }
.pr-card.is-stale   { opacity: 0.45; pointer-events: none; }

.pr-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 7px;
}

.pr-repo {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  background: rgba(96,165,250,0.08);
  padding: 2px 7px;
  border-radius: 4px;
  border: 1px solid rgba(96,165,250,0.15);
  white-space: nowrap;
  flex-shrink: 0;
}

.pr-number {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  flex-shrink: 0;
}

.pr-badges {
  display: flex;
  gap: 5px;
  margin-left: auto;
  align-items: center;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 4px;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.badge-green { background: rgba(52,211,153,0.12); color: var(--green); }
.badge-amber { background: rgba(251,191,36,0.12);  color: var(--amber); }
.badge-red   { background: rgba(248,113,113,0.12); color: var(--red); }
.badge-gray  { background: rgba(79,96,112,0.18);   color: var(--muted); }
.badge-blue  { background: rgba(96,165,250,0.12);  color: var(--accent); }

.pr-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 10px;
  line-height: 1.4;
  text-wrap: balance;
}
.pr-title a { color: inherit; text-decoration: none; }
.pr-title a:hover { color: var(--accent); }

.pr-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  color: var(--muted);
  flex-wrap: wrap;
}

.pr-author {
  display: flex;
  align-items: center;
  gap: 5px;
}
.pr-author img {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  flex-shrink: 0;
}

.pr-actions {
  margin-left: auto;
  display: flex;
  gap: 6px;
}

/* ── Loading / empty / error ── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 40px;
  color: var(--muted);
  font-size: 13px;
}

@keyframes spin { to { transform: rotate(360deg); } }

@keyframes cardIn {
  0%   { opacity: 0; max-height: 0; margin-bottom: 0; padding-top: 0; padding-bottom: 0; }
  40%  { max-height: 160px; margin-bottom: 6px; padding-top: 14px; padding-bottom: 14px; opacity: 0; }
  100% { opacity: 1; max-height: 160px; margin-bottom: 6px; padding-top: 14px; padding-bottom: 14px; }
}
.pr-card.is-new {
  animation: cardIn 0.8s ease both;
  overflow: hidden;
}

.spinner {
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}

.empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.7;
}

.error-msg {
  background: rgba(248,113,113,0.07);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: 8px;
  padding: 14px 16px;
  color: var(--red);
  font-size: 13px;
  margin-bottom: 16px;
  line-height: 1.5;
}

/* ── Layout ── */
.main-layout {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 24px;
  align-items: start;
}
@media (max-width: 680px) { .main-layout { grid-template-columns: 1fr; } }

/* ── Own PRs panel ── */
.own-column-header {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.own-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 5px;
  transition: border-color 0.15s;
  font-size: 12px;
  position: relative;
}
.own-card:hover { border-color: var(--border-hover); }

.own-card-top {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}

.own-card-title {
  line-height: 1.35;
  color: var(--text);
  font-weight: 500;
  font-size: 12px;
}
.own-card-title a { color: inherit; text-decoration: none; }
.own-card-title a:hover { color: var(--accent); }

#own-pr-list .pr-card { padding: 10px 12px; }
#own-pr-list .pr-title { font-size: 12px; margin-bottom: 6px; }
#own-pr-list .pr-repo  { font-size: 10px; }
#own-pr-list .pr-number { font-size: 10px; }
#own-pr-list .pr-meta  { font-size: 11px; }
#own-pr-list .badge    { font-size: 10px; padding: 1px 5px; }
#own-pr-list .btn-sm   { font-size: 11px; padding: 3px 8px; }
#own-pr-list .pr-author img { width: 14px; height: 14px; }

/* ── Tooltip ── */
#tip {
  position: fixed;
  background: #1E2838;
  color: var(--text);
  font-size: 11px;
  line-height: 1.4;
  padding: 5px 9px;
  border-radius: 5px;
  border: 1px solid #2A3B50;
  pointer-events: none;
  z-index: 9999;
  opacity: 0;
  max-width: 240px;
  white-space: normal;
  cursor: default;
  user-select: none;
}
#tip.visible { opacity: 1; }

[data-tip], .badge { cursor: default; user-select: none; }

.hidden { display: none !important; }
</style>

<div id="tip"></div>
<div class="app">

  <!-- Header -->
  <div class="header">
    <h1>
      <span class="header-dot" id="status-dot"></span>
      PR Review Queue
    </h1>
    <div class="header-right">
      <span class="header-meta" id="week-score" style="display:none;cursor:default;transition:transform 0.15s;"></span>
      <span class="header-meta" id="last-updated"></span>
      <span class="header-meta hidden" id="logged-user" style="color:var(--muted)"></span>
      <button class="text-btn hidden" id="signout-btn" style="color:var(--muted)">Sign out</button>
      <button class="text-btn" id="config-toggle-btn">Config</button>
    </div>
  </div>

  <!-- Auth -->
  <div id="auth-section" class="auth-section">
    <span class="auth-label">GitHub Token</span>
    <div class="auth-row">
      <input type="password" id="token-input" class="input" placeholder="ghp_…" autocomplete="off" />
      <button class="btn btn-primary" id="save-token-btn">Connect</button>
    </div>
    <p class="auth-hint">
      Needs <code style="font-family:var(--mono);background:var(--bg);padding:1px 5px;border-radius:3px;font-size:11px;">repo</code> scope ·
      <a href="https://github.com/settings/tokens/new?scopes=repo&description=PR+Review+Queue" target="_blank" rel="noopener">Crear token →</a> ·
      se guarda en localStorage
    </p>
  </div>

  <!-- Config -->
  <div id="config-section" class="config-section hidden">
    <div class="config-field">
      <label>Org</label>
      <input type="text" id="cfg-org" class="input" value="HumandDev" />
    </div>
    <div class="config-field">
      <label>Label</label>
      <input type="text" id="cfg-label" class="input" value="comm" />
    </div>
    <div class="config-field">
      <label>Bot pattern (regex)</label>
      <input type="text" id="cfg-bots" class="input" value="hu-agent|hu-reviewer" />
    </div>
    <div class="config-field" style="grid-column:span 2; display:flex; justify-content:flex-end;">
      <button class="btn btn-primary btn-sm" id="config-save-btn">Save & refresh</button>
    </div>
  </div>

  <div class="main-layout">
  <div class="tribe-column">

  <!-- Toolbar -->
  <div id="toolbar" class="toolbar hidden">
    <label class="toggle-label">
      <input type="checkbox" id="ready-only-toggle" />
      Ready to review only
    </label>
    <label class="toggle-label">
      <input type="checkbox" id="show-ignored-toggle" checked />
      Show skipped
    </label>
    <div class="toolbar-right">
      <button class="btn btn-ghost btn-sm" id="refresh-btn">↺ Refresh</button>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-bar" id="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <!-- Error -->
  <div id="error-msg" class="error-msg hidden"></div>

  <!-- Loading -->
  <div id="loading" class="loading hidden">
    <div class="spinner"></div>
    <span id="loading-text">Loading PRs…</span>
  </div>

  <!-- PR list -->
  <div id="pr-list"></div>

  <!-- Empty -->
  <div id="empty" class="empty hidden">
    No hay PRs con label <code id="empty-label" style="font-family:var(--mono);font-size:11px;background:var(--surface);padding:1px 5px;border-radius:3px;"></code> abiertos en este momento.
  </div>

  </div><!-- /tribe-column -->

  <!-- Own PRs -->
  <div class="own-column" id="own-column" style="display:none">
    <div class="own-column-header">
      Mis PRs <span class="count-badge" id="own-count"></span>
    </div>
    <div id="own-loading" class="loading hidden" style="padding:20px;font-size:12px;">
      <div class="spinner"></div>
    </div>
    <div id="own-pr-list"></div>
    <div id="own-empty" class="empty hidden" style="padding:20px;font-size:12px;">Sin PRs abiertos.</div>
  </div>

  </div><!-- /main-layout -->

</div>

<script>
const API = 'https://api.github.com';

const STORAGE = {
  token:   'prq_token',
  ignored: 'prq_ignored',
  config:  'prq_config',
};

let state = {
  token:   localStorage.getItem(STORAGE.token) || '',
  ignored: new Set(JSON.parse(localStorage.getItem(STORAGE.ignored) || '[]')),
  config: {
    org:   'HumandDev',
    label: 'comm',
    bots:  'hu-agent|hu-reviewer',
    ...JSON.parse(localStorage.getItem(STORAGE.config) || '{}'),
  },
  me:          localStorage.getItem('prq_me') || '',
  meAvatar:    localStorage.getItem('prq_me_avatar') || '',
  prs:         [],
  renderedIds:   new Set(),
  cardTimers:    [],
  ownPRs:      [],
  mergedPRs:   [],
  ownActivity: JSON.parse(localStorage.getItem('prq_own_activity') || '{}'),
  loading:     false,
  readyOnly:   false,
  showIgnored: true,
  lastUpdated: null,
};

const $ = id => document.getElementById(id);

const el = {
  authSection:  $('auth-section'),
  tokenInput:   $('token-input'),
  saveTokenBtn: $('save-token-btn'),
  configSection: $('config-section'),
  configToggle:  $('config-toggle-btn'),
  configSave:    $('config-save-btn'),
  cfgOrg:   $('cfg-org'),
  cfgLabel: $('cfg-label'),
  cfgBots:  $('cfg-bots'),
  toolbar:       $('toolbar'),
  progressBar:   $('progress-bar'),
  progressFill:  $('progress-fill'),
  errorMsg:      $('error-msg'),
  loading:       $('loading'),
  loadingText:   $('loading-text'),
  prList:        $('pr-list'),
  empty:         $('empty'),
  lastUpdated:   $('last-updated'),
  readyOnly:     $('ready-only-toggle'),
  showIgnored:   $('show-ignored-toggle'),
  refreshBtn:    $('refresh-btn'),
  statusDot:     $('status-dot'),
  loggedUser:    $('logged-user'),
  signoutBtn:    $('signout-btn'),
  ownColumn:     $('own-column'),
  ownLoading:    $('own-loading'),
  ownPrList:     $('own-pr-list'),
  ownEmpty:      $('own-empty'),
  ownCount:      $('own-count'),
};

// ── Persistence ──────────────────────────────────────────────

function saveIgnored() {
  localStorage.setItem(STORAGE.ignored, JSON.stringify([...state.ignored]));
}

function saveConfig() {
  localStorage.setItem(STORAGE.config, JSON.stringify(state.config));
}

function readConfigFields() {
  state.config = {
    org:   el.cfgOrg.value.trim()   || 'HumandDev',
    label: el.cfgLabel.value.trim() || 'comm',
    bots:  el.cfgBots.value.trim()  || 'hu-agent|hu-reviewer',
  };
  saveConfig();
  updateURL();
}

function writeConfigFields() {
  el.cfgOrg.value   = state.config.org;
  el.cfgLabel.value = state.config.label;
  el.cfgBots.value  = state.config.bots;
}

// ── URL state ────────────────────────────────────────────────

function updateURL() {
  const p = new URLSearchParams();
  if (state.readyOnly)            p.set('ready',   '1');
  if (state.showIgnored)          p.set('skipped', '1');
  if (state.config.org   !== 'HumandDev')             p.set('org',   state.config.org);
  if (state.config.label !== 'comm')                  p.set('label', state.config.label);
  if (state.config.bots  !== 'hu-agent|hu-reviewer')  p.set('bots',  state.config.bots);
  const qs = p.toString();
  history.replaceState(null, '', qs ? `?${qs}` : location.pathname);
}

function readURL() {
  const p = new URLSearchParams(location.search);
  if (p.has('ready'))   state.readyOnly   = p.get('ready')   === '1';
  if (p.has('skipped')) state.showIgnored = p.get('skipped') === '1';
  if (p.has('org'))   state.config.org   = p.get('org');
  if (p.has('label')) state.config.label = p.get('label');
  if (p.has('bots'))  state.config.bots  = p.get('bots');
}

// ── GitHub API ───────────────────────────────────────────────

async function apiFetch(url) {
  const res = await fetch(url, {
    headers: {
      Authorization: `Bearer ${state.token}`,
      Accept: 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
    },
  });
  if (!res.ok) {
    const body = await res.text().catch(() => '');
    let msg = '';
    try { msg = JSON.parse(body).message; } catch { msg = body; }
    throw new Error(`GitHub ${res.status}: ${msg || res.statusText}`);
  }
  return res.json();
}

async function getCIStatus(owner, repo, sha) {
  try {
    const data = await apiFetch(`${API}/repos/${owner}/${repo}/commits/${sha}/check-runs?per_page=100`);
    const runs = (data.check_runs || []).filter(r => r.app?.slug !== 'dependabot');
    if (runs.length === 0) return 'unknown';
    if (runs.some(r => r.status !== 'completed')) return 'pending';
    const bad = runs.filter(r => !['success', 'skipped', 'neutral'].includes(r.conclusion));
    return bad.length === 0 ? 'green' : 'failed';
  } catch {
    return 'unknown';
  }
}

async function enrichPR(pr, botRe, onProgress) {
  const [owner, repo] = pr.repository_url.replace(`${API}/repos/`, '').split('/');
  const number = pr.number;

  const isBot = u => u.type === 'Bot' || u.login.endsWith('[bot]') || botRe.test(u.login);
  if (pr.user.login === state.me) { onProgress(); return null; }
  if (isBot(pr.user)) {
    onProgress();
    return { id: pr.id, number, owner, repo, title: pr.title,
      author: pr.user.login, authorAvatar: pr.user.avatar_url,
      url: pr.html_url, createdAt: new Date(pr.created_at),
      ci: 'unknown', humanReviews: 0, humanComments: 0, draft: false,
      conflicts: false, ready: false, botPR: true };
  }

  try {
    const [prDetails, reviews, comments] = await Promise.all([
      apiFetch(`${API}/repos/${owner}/${repo}/pulls/${number}`),
      apiFetch(`${API}/repos/${owner}/${repo}/pulls/${number}/reviews`),
      apiFetch(`${API}/repos/${owner}/${repo}/issues/${number}/comments`),
    ]);

    const sha = prDetails.head.sha;
    const ci  = await getCIStatus(owner, repo, sha);

    const isHuman = u => !isBot(u) && u.login !== pr.user.login;
    const humanRevs     = (reviews  || []).filter(r => isHuman(r.user));
    const humanComments = (comments || []).filter(c => isHuman(c.user));
    const humanActivity = humanRevs.length + humanComments.length;
    const activityBy    = [...new Set([...humanRevs.map(r => r.user.login), ...humanComments.map(c => c.user.login)])];
    const approved      = humanRevs.some(r => r.state === 'APPROVED');
    const changesReq    = humanRevs.some(r => r.state === 'CHANGES_REQUESTED');

    onProgress();
    return { id: pr.id, number, owner, repo, title: pr.title,
      author: pr.user.login, authorAvatar: pr.user.avatar_url,
      url: pr.html_url, createdAt: new Date(pr.created_at),
      ci, humanActivity, activityBy, approved, changesReq, draft: prDetails.draft,
      conflicts: prDetails.mergeable_state === 'dirty',
      lines: (prDetails.additions || 0) + (prDetails.deletions || 0),
      dontMerge: pr.labels.some(l => l.name.includes("don't merge") || l.name.includes("dont merge") || l.name.includes("🚧")),
      ready: ci === 'green' && humanActivity === 0 && !prDetails.draft
        && !pr.labels.some(l => l.name.includes("don't merge") || l.name.includes("dont merge") || l.name.includes("🚧")) };
  } catch {
    onProgress();
    return null;
  }
}

// ── Helpers ──────────────────────────────────────────────────

function timeAgo(date) {
  const m = Math.floor((Date.now() - date) / 60000);
  if (m < 60)   return `${m}m ago`;
  if (m < 1440) return `${Math.floor(m/60)}h ago`;
  return `${Math.floor(m/1440)}d ago`;
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showError(msg) {
  el.errorMsg.textContent = msg;
  el.errorMsg.classList.remove('hidden');
}

function ciBadge(ci) {
  const map = {
    green:   ['badge-green', '✓ CI'],
    pending: ['badge-amber', '◐ CI'],
    failed:  ['badge-red',   '✗ CI'],
    unknown: ['badge-gray',  '— CI'],
  };
  const [cls, lbl] = map[ci] || map.unknown;
  return `<span class="badge ${cls}">${lbl}</span>`;
}

// ── Helpers ──────────────────────────────────────────────────

function lineCountHTML(n) {
  if (n == null || n === 0) return '';
  let color, weight, extra = '';
  if      (n <= 10)  { color = '#ffd700'; weight = 700; extra = ' ✦'; }
  else if (n <= 20)  { color = '#f0c040'; weight = 600; }
  else if (n <= 50)  { color = '#9fcf6f'; weight = 500; }
  else if (n <= 150) { color = '#3fb950'; weight = 400; }
  else if (n <= 400) { color = '#6e7681'; weight = 400; }
  else               { color = '#3d4451'; weight = 400; }
  return `<span class="badge" style="color:${color};font-weight:${weight};background:transparent;padding:2px 4px;">${n} líneas${extra}</span>`;
}

function sizeBadgeHTML(n) {
  if (n == null || n === 0) return '';
  let label, bg, clr;
  if      (n <= 20)  { label = 'XS'; bg = 'rgba(251,191,36,0.14)';  clr = '#FBBF24'; }
  else if (n <= 80)  { label = 'S';  bg = 'rgba(52,211,153,0.12)';  clr = '#34D399'; }
  else if (n <= 250) { label = 'M';  bg = 'rgba(96,165,250,0.12)';  clr = '#60A5FA'; }
  else if (n <= 500) { label = 'L';  bg = 'rgba(167,139,250,0.12)'; clr = '#A78BFA'; }
  else               { label = 'XL'; bg = 'rgba(79,96,112,0.18)';   clr = '#6e7681'; }
  return `<span class="badge" style="background:${bg};color:${clr};font-weight:600;">${label}</span>`;
}

// ── Score ─────────────────────────────────────────────────────

function weekStart() {
  const d = new Date();
  const diff = d.getDate() - d.getDay() + (d.getDay() === 0 ? -6 : 1);
  return new Date(d.getFullYear(), d.getMonth(), diff).toISOString().split('T')[0];
}

function loadScore() {
  const saved = JSON.parse(localStorage.getItem('prq_score') || '{}');
  if (saved.week !== weekStart()) return { week: weekStart(), pts: 0, xs: 0, s: 0, m: 0, l: 0, xl: 0, autoIds: [] };
  return { autoIds: [], ...saved };
}

function saveScore(score) {
  localStorage.setItem('prq_score', JSON.stringify(score));
}

function ptsForLines(n) {
  if (n <= 20)  return 1;
  if (n <= 80)  return 2;
  if (n <= 250) return 3.5;
  if (n <= 500) return 5.5;
  return 8;
}

function sizeKey(n) {
  if (n <= 20)  return 'xs';
  if (n <= 80)  return 's';
  if (n <= 250) return 'm';
  if (n <= 500) return 'l';
  return 'xl';
}

function renderScore() {
  const score = loadScore();
  const el = document.getElementById('week-score');
  if (!el) return;
  const parts = ['xs','s','m','l','xl'].filter(k => score[k] > 0).map(k => `${k.toUpperCase()}×${score[k]}`);
  el.style.display = score.pts > 0 ? '' : 'none';
  el.title = parts.join(' · ');
  el.textContent = `🏆 ${score.pts % 1 === 0 ? score.pts : score.pts.toFixed(1)} pts`;
}

function awardPoints(lines) {
  const score = loadScore();
  score.pts += ptsForLines(lines);
  score[sizeKey(lines)] = (score[sizeKey(lines)] || 0) + 1;
  saveScore(score);
  renderScore();
  const el = document.getElementById('week-score');
  if (el) { el.style.transform = 'scale(1.2)'; setTimeout(() => el.style.transform = '', 200); }
}

async function loadAutoScore() {
  if (!state.token || !state.me) return;
  const { org, label } = state.config;
  const since = weekStart();
  try {
    const data = await apiFetch(
      `${API}/search/issues?q=is:pr+org:${encodeURIComponent(org)}+label:${encodeURIComponent(label)}+reviewed-by:${encodeURIComponent(state.me)}+updated:>=${since}&per_page=50&sort=updated&order=desc`
    );
    const items = data.items || [];
    const score = loadScore();
    const autoIds = new Set(score.autoIds || []);
    const candidates = items.filter(pr => pr.user.login !== state.me && !autoIds.has(pr.id));
    if (candidates.length === 0) return;

    for (let i = 0; i < candidates.length; i += 3) {
      const batch = candidates.slice(i, i + 3);
      await Promise.all(batch.map(async pr => {
        const [owner, repo] = pr.repository_url.replace(`${API}/repos/`, '').split('/');
        try {
          const [prDetails, reviews] = await Promise.all([
            apiFetch(`${API}/repos/${owner}/${repo}/pulls/${pr.number}`),
            apiFetch(`${API}/repos/${owner}/${repo}/pulls/${pr.number}/reviews`),
          ]);
          const userApproved = (reviews || []).some(r => r.user.login === state.me && r.state === 'APPROVED');
          if (!userApproved) return;
          const lines = (prDetails.additions || 0) + (prDetails.deletions || 0);
          const fresh = loadScore();
          fresh.pts += ptsForLines(lines);
          fresh[sizeKey(lines)] = (fresh[sizeKey(lines)] || 0) + 1;
          fresh.autoIds = [...new Set([...(fresh.autoIds || []), pr.id])];
          saveScore(fresh);
          renderScore();
        } catch { /* silent */ }
      }));
    }
  } catch { /* silent */ }
}

// ── Render ───────────────────────────────────────────────────

function renderCard(pr, isNew = false, delay = 0) {
  const ignored = state.ignored.has(pr.id);
  const activityBadge = pr.humanActivity > 0
    ? `<span class="badge badge-blue" data-tip="${pr.humanActivity} comentario${pr.humanActivity > 1 ? 's' : ''} de ${pr.activityBy.join(', ')}">👁 ${pr.humanActivity}</span>`
    : '';
  const approvalBadge = pr.changesReq ? `<span class="badge badge-red" data-tip="Alguien pidió cambios">✗ Cambios</span>`
    : pr.approved ? `<span class="badge badge-green" data-tip="Tiene al menos un approve">✓ Aprobado</span>` : '';
  const draftBadge     = pr.draft      ? `<span class="badge badge-amber" data-tip="PR en borrador, no listo para review">Draft</span>` : '';
  const conflictBadge  = pr.conflicts  ? `<span class="badge badge-red">⚡ Conflicts</span>` : '';
  const dontMergeBadge = pr.dontMerge  ? `<span class="badge badge-amber">🚧 Don't merge</span>` : '';

  const newCls   = isNew ? ' is-new' : '';
  const newStyle = isNew && delay ? ` style="animation-delay:${delay}ms"` : '';
  return `
    <div class="pr-card${ignored ? ' is-ignored' : ''}${newCls}" data-id="${pr.id}"${newStyle}>
      <div style="display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:7px;">
        <div class="pr-title" style="margin:0;flex:1;">
          <a href="${esc(pr.url)}" target="_blank" rel="noopener">${esc(pr.title)}</a>
        </div>
        <div style="display:flex;align-items:center;gap:5px;flex-shrink:0;">
          ${sizeBadgeHTML(pr.lines)}${lineCountHTML(pr.lines)}
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="pr-repo">${esc(pr.repo)}</span>
          <span class="pr-number">#${pr.number}</span>
        </div>
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:flex-end;">
          ${ciBadge(pr.ci)}${activityBadge}${approvalBadge}${conflictBadge}${dontMergeBadge}${draftBadge}<span class="badge badge-gray">${timeAgo(pr.createdAt)}</span>
        </div>
      </div>
      <div class="pr-meta">
        <div class="pr-author">
          ${pr.authorAvatar ? `<img src="${esc(pr.authorAvatar)}" alt="${esc(pr.author)}" loading="lazy" />` : ''}
          <span>${esc(pr.author)}</span>
        </div>
        <div class="pr-actions">
          <a href="${esc(pr.url)}" target="_blank" rel="noopener" class="btn btn-ghost btn-sm">Open →</a>
          ${pr.ready && !ignored ? `<button class="btn btn-ghost btn-sm done-btn" data-id="${pr.id}" data-lines="${pr.lines || 0}" style="color:var(--green);border-color:rgba(52,211,153,0.3)">✓ Done</button>` : ''}
          ${pr.noSkip ? '' : `<button class="btn btn-ghost btn-sm ignore-btn" data-id="${pr.id}">${ignored ? 'Restore' : 'Skip'}</button>`}
        </div>
      </div>
    </div>`;
}

function renderList() {
  state.cardTimers.forEach(clearTimeout);
  state.cardTimers = [];
  const visible = state.prs.filter(pr => {
    if (!state.showIgnored && state.ignored.has(pr.id)) return false;
    if (state.readyOnly && !pr.ready) return false;
    return true;
  });

  const botPRs  = state.prs.filter(p => p.botPR);
  const ready   = visible.filter(p => p.ready && !state.ignored.has(p.id) && !p.botPR);
  const others  = visible
    .filter(p => (!p.ready || state.ignored.has(p.id)) && !p.botPR)
    .sort((a, b) => {
      const aSkippedReady = a.ready && state.ignored.has(a.id) ? 0 : 1;
      const bSkippedReady = b.ready && state.ignored.has(b.id) ? 0 : 1;
      return aSkippedReady - bSkippedReady;
    });

  el.empty.classList.toggle('hidden', visible.length > 0 || botPRs.length > 0);
  const emptyLabel = document.getElementById('empty-label');
  if (emptyLabel) emptyLabel.textContent = state.config.label;

  if (visible.length === 0 && botPRs.length === 0) { el.prList.innerHTML = ''; return; }

  let newIdx = 0;
  const rc = pr => {
    const isNew = !state.renderedIds.has(pr.id);
    return renderCard(pr, isNew, isNew ? newIdx++ * 500 : 0);
  };

  const quickWins    = ready.filter(p => (p.lines || 0) > 0 && (p.lines || 0) <= 20);
  const regularReady = ready.filter(p => (p.lines || 0) === 0 || (p.lines || 0) > 20);

  let html = '';
  if (quickWins.length > 0) {
    html += `<div class="quick-wins-section">`;
    html += `<div class="section-label">⚡ quick wins <span class="count-badge ready">${quickWins.length}</span></div>`;
    html += quickWins.map(rc).join('');
    html += `</div>`;
  }
  html += `<div class="section-label">Ready to review ${regularReady.length > 0 ? `<span class="count-badge ready">${regularReady.length}</span>` : ''}</div>`;
  html += regularReady.length > 0
    ? regularReady.map(rc).join('')
    : quickWins.length > 0
      ? `<div style="padding:16px 0;text-align:center;font-size:12px;color:var(--muted);">No hay más PRs listos para review.</div>`
      : `<div style="padding:20px 0;text-align:center;font-size:12px;color:var(--muted);">Ningún PR listo para review 🎉</div>`;
  if (!state.readyOnly && others.length > 0) {
    html += `<div class="section-label">Has activity <span class="count-badge">${others.length}</span></div>`;
    html += others.map(rc).join('');
  }
  if (botPRs.length > 0) {
    html += `<div class="section-label">Bots <span class="count-badge">${botPRs.length}</span></div>`;
    html += botPRs.map(rc).join('');
  }

  // Mark all as rendered after this paint
  [...ready, ...others, ...botPRs].forEach(p => state.renderedIds.add(p.id));

  el.prList.innerHTML = html;

  // Stagger-animate newly appeared cards
  el.prList.querySelectorAll('.pr-card.is-new').forEach(card => {
    const delay  = parseFloat(card.style.animationDelay) || 0;
    const parent = card.parentNode;
    const next   = card.nextSibling;
    parent.removeChild(card);
    card.style.removeProperty('animation-delay');
    state.cardTimers.push(setTimeout(() => {
      if (next && next.parentNode === parent) parent.insertBefore(card, next);
      else parent.appendChild(card);
      card.style.animation = 'none';
      card.offsetHeight;
      card.style.animation = '';
    }, delay));
  });

  el.prList.querySelectorAll('.ignore-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = Number(btn.dataset.id);
      if (state.ignored.has(id)) state.ignored.delete(id);
      else state.ignored.add(id);
      saveIgnored();
      renderList();
    });
  });

  el.prList.querySelectorAll('.done-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id    = Number(btn.dataset.id);
      const lines = Number(btn.dataset.lines);
      awardPoints(lines);
      state.prs = state.prs.filter(p => p.id !== id);
      renderList();
    });
  });
}

// ── Own PRs ──────────────────────────────────────────────────

function saveOwnActivity() {
  localStorage.setItem('prq_own_activity', JSON.stringify(state.ownActivity));
}

async function enrichOwnPR(pr) {
  const [owner, repo] = pr.repository_url.replace(`${API}/repos/`, '').split('/');
  const number = pr.number;
  const botRe  = new RegExp(state.config.bots, 'i');
  const isBot  = u => u.type === 'Bot' || u.login.endsWith('[bot]') || botRe.test(u.login);
  const isOther = u => !isBot(u) && u.login !== pr.user.login;

  try {
    const [prDetails, reviews, comments] = await Promise.all([
      apiFetch(`${API}/repos/${owner}/${repo}/pulls/${number}`),
      apiFetch(`${API}/repos/${owner}/${repo}/pulls/${number}/reviews`),
      apiFetch(`${API}/repos/${owner}/${repo}/issues/${number}/comments`),
    ]);

    const humanRevs     = (reviews  || []).filter(r => isOther(r.user));
    const humanComments = (comments || []).filter(c => isOther(c.user));

    const stored        = state.ownActivity[pr.id] || { commentIds: [], reviewIds: [] };
    const seenComments  = new Set(stored.commentIds);
    const seenReviews   = new Set(stored.reviewIds);

    const newComments   = humanComments.filter(c => !seenComments.has(c.id)).length;
    const newApprovals  = humanRevs.filter(r => r.state === 'APPROVED'          && !seenReviews.has(r.id)).length;
    const newChanges    = humanRevs.filter(r => r.state === 'CHANGES_REQUESTED' && !seenReviews.has(r.id)).length;
    const approved      = humanRevs.some(r => r.state === 'APPROVED');
    const changesReq    = humanRevs.some(r => r.state === 'CHANGES_REQUESTED');

    const sha = prDetails.head.sha;
    const ci  = await getCIStatus(owner, repo, sha);

    return { id: pr.id, number, owner, repo, title: pr.title, url: pr.html_url,
      ci, conflicts: prDetails.mergeable_state === 'dirty', draft: prDetails.draft,
      lines: (prDetails.additions || 0) + (prDetails.deletions || 0),
      createdAt: new Date(pr.created_at),
      approved, changesReq, newComments, newApprovals, newChanges,
      allCommentIds: humanComments.map(c => c.id),
      allReviewIds:  humanRevs.map(r => r.id) };
  } catch { return null; }
}

function renderOwnPRs() {
  const prs = state.ownPRs;
  el.ownEmpty.classList.toggle('hidden', prs.length > 0 || state.mergedPRs.length > 0);
  el.ownCount.textContent = prs.length > 0 ? prs.length : '';
  el.ownCount.style.display = prs.length > 0 ? '' : 'none';

  let html = prs.map(p => renderCard({
    ...p,
    author: state.me, authorAvatar: state.meAvatar,
    humanActivity: p.newComments || 0, activityBy: [], dontMerge: false, ready: false,
    noSkip: true,
  })).join('');

  if (state.mergedPRs.length > 0) {
    html += `<div class="section-label" style="margin-top:16px;font-size:10px;">Mergeados <span class="count-badge" style="font-size:10px">${state.mergedPRs.length}</span></div>`;
    html += state.mergedPRs.map(pr => `
      <div class="own-card" style="opacity:0.6;">
        <div class="own-card-top">
          <span class="pr-repo">${esc(pr.repo)}</span>
          <span class="pr-number">#${pr.number}</span>
          <span class="badge badge-green" style="font-size:10px;margin-left:auto;">✓ Merged</span>
        </div>
        <div class="own-card-title">
          <a href="${esc(pr.url)}" target="_blank" rel="noopener">${esc(pr.title)}</a>
        </div>
      </div>`).join('');
  }

  el.ownPrList.innerHTML = html;

  el.ownPrList.querySelectorAll('.own-pr-link').forEach(link => {
    link.addEventListener('click', () => {
      const id   = Number(link.dataset.id);
      const cids = link.dataset.cids ? link.dataset.cids.split(',').map(Number).filter(Boolean) : [];
      const rids = link.dataset.rids ? link.dataset.rids.split(',').map(Number).filter(Boolean) : [];
      state.ownActivity[id] = { commentIds: cids, reviewIds: rids };
      saveOwnActivity();
      const pr = state.ownPRs.find(p => p.id === id);
      if (pr) { pr.newComments = 0; pr.newApprovals = 0; pr.newChanges = 0; }
      renderOwnPRs();
    });
  });
}

async function loadOwnPRs() {
  if (!state.token) return;
  const { org, label } = state.config;
  if (!state.me) return;

  el.ownColumn.style.display = '';
  if (state.ownPRs.length === 0) el.ownLoading.classList.remove('hidden');

  try {
    const [openData, mergedData] = await Promise.all([
      apiFetch(`${API}/search/issues?q=is:pr+is:open+label:${encodeURIComponent(label)}+org:${encodeURIComponent(org)}+author:${encodeURIComponent(state.me)}&per_page=50&sort=created&order=desc`),
      apiFetch(`${API}/search/issues?q=is:pr+is:merged+label:${encodeURIComponent(label)}+org:${encodeURIComponent(org)}+author:${encodeURIComponent(state.me)}+merged:>${threeDAysAgo()}&per_page=20&sort=updated&order=desc`),
    ]);

    const items = openData.items || [];
    const results = [];
    for (let i = 0; i < items.length; i += 4) {
      const batch = items.slice(i, i + 4);
      const out   = await Promise.all(batch.map(enrichOwnPR));
      results.push(...out);
    }
    state.ownPRs       = results.filter(Boolean);
    state.mergedPRs    = (mergedData.items || []).map(pr => {
      const [owner, repo] = pr.repository_url.replace(`${API}/repos/`, '').split('/');
      return { id: pr.id, number: pr.number, owner, repo, title: pr.title, url: pr.html_url, updatedAt: new Date(pr.updated_at) };
    });
    renderOwnPRs();
  } catch { /* silent */ } finally {
    el.ownLoading.classList.add('hidden');
  }
}

function threeDAysAgo() {
  const d = new Date(Date.now() - 3 * 24 * 60 * 60 * 1000);
  return d.toISOString().split('T')[0];
}

// ── Load PRs ─────────────────────────────────────────────────

async function loadPRs() {
  if (!state.token || state.loading) return;
  state.loading = true;

  const hasExisting = state.prs.length > 0;
  if (!hasExisting) state.renderedIds = new Set();
  
  el.progressFill.style.width = '0%';
  if (!hasExisting) {
    el.loading.classList.remove('hidden');
    el.loadingText.textContent = 'Fetching PR list…';
  }
  el.errorMsg.classList.add('hidden');
  el.empty.classList.add('hidden');
  el.refreshBtn.disabled = true;
  el.statusDot.className = 'header-dot';

  try {
    const { org, label } = state.config;
    const botRe = new RegExp(state.config.bots, 'i');

    const data = await apiFetch(
      `${API}/search/issues?q=is:pr+is:open+label:${encodeURIComponent(label)}+org:${encodeURIComponent(org)}&per_page=100&sort=created&order=desc`
    );

    const items = data.items || [];
    el.progressFill.style.width = '8%';

    if (items.length === 0) {
      state.prs = [];
      el.loading.classList.add('hidden');
      renderList();
      el.toolbar.classList.remove('hidden');
      el.statusDot.className = 'header-dot live';
      return;
    }

    let done = 0;
    const onProgress = () => {
      done++;
      if (!hasExisting) el.loadingText.textContent = `Checking PR ${done} of ${items.length}…`;
      el.progressFill.style.width = `${8 + Math.round((done / items.length) * 87)}%`;
    };

    const newSearchIds = new Set(items.map(i => i.id));

    for (let i = 0; i < items.length; i += 4) {
      const batch = items.slice(i, i + 4);
      const out   = await Promise.all(batch.map(pr => enrichPR(pr, botRe, onProgress)));
      for (const pr of out.filter(Boolean)) {
        const idx = state.prs.findIndex(p => p.id === pr.id);
        if (idx >= 0) state.prs[idx] = pr;
        else state.prs.push(pr);
      }
    }

    // Remove PRs that are no longer in the search results
    state.prs = state.prs.filter(p => newSearchIds.has(p.id));
    state.lastUpdated = Date.now();
    el.lastUpdated.textContent = 'Updated just now';
    el.progressFill.style.width = '100%';
    setTimeout(() => { el.progressFill.style.width = '0%'; }, 500);
    el.toolbar.classList.remove('hidden');
    el.statusDot.className = 'header-dot live';
    renderList();

  } catch (err) {
    // Token might be expired — if 401 reset to auth
    if (err.message.includes('401')) {
      state.token = '';
      localStorage.removeItem(STORAGE.token);
      el.authSection.classList.remove('hidden');
      showError('Session expired. Please sign in again.');
    } else {
      showError(err.message);
    }
    el.progressFill.style.width = '0%';
    el.statusDot.className = 'header-dot';
  } finally {
    state.loading = false;
    el.loading.classList.add('hidden');
    el.refreshBtn.disabled = false;
  }
}

// ── Events ───────────────────────────────────────────────────

async function connectToken(val) {
  state.token = val;
  localStorage.setItem(STORAGE.token, val);
  try {
    const user = await apiFetch(`${API}/user`);
    state.me = user.login;
    state.meAvatar = user.avatar_url || '';
    localStorage.setItem('prq_me', state.me);
    localStorage.setItem('prq_me_avatar', state.meAvatar);
    el.loggedUser.textContent = '@' + state.me;
    el.loggedUser.classList.remove('hidden');
    el.signoutBtn.classList.remove('hidden');
  } catch { state.me = ''; }
  el.authSection.classList.add('hidden');
  loadPRs();
  loadOwnPRs();
  loadAutoScore();
}

el.saveTokenBtn.addEventListener('click', () => {
  const val = el.tokenInput.value.trim();
  if (val) connectToken(val);
});
el.tokenInput.addEventListener('keydown', e => { if (e.key === 'Enter') el.saveTokenBtn.click(); });

let configOpen = false;
el.configToggle.addEventListener('click', () => {
  configOpen = !configOpen;
  el.configSection.classList.toggle('hidden', !configOpen);
  el.configToggle.textContent = configOpen ? 'Done' : 'Config';
  if (configOpen) writeConfigFields();
});

[el.cfgOrg, el.cfgLabel, el.cfgBots].forEach(input => {
  input.addEventListener('keydown', e => { if (e.key === 'Enter') el.configSave.click(); });
});

el.configSave.addEventListener('click', () => {
  readConfigFields();
  configOpen = false;
  el.configSection.classList.add('hidden');
  el.configToggle.textContent = 'Config';
  if (state.token) loadPRs();
});

el.signoutBtn.addEventListener('click', () => {
  state.token = ''; state.me = '';
  localStorage.removeItem(STORAGE.token);
  localStorage.removeItem('prq_me');
  el.authSection.classList.remove('hidden');
  el.configSection.classList.add('hidden');
  el.toolbar.classList.add('hidden');
  el.prList.innerHTML = '';
  el.ownPrList.innerHTML = '';
  el.ownColumn.style.display = 'none';
  configOpen = false;
  el.configToggle.textContent = 'Config';
  el.statusDot.className = 'header-dot';
  el.tokenInput.value = '';
  el.loggedUser.classList.add('hidden');
  el.signoutBtn.classList.add('hidden');
});

el.refreshBtn.addEventListener('click', () => { loadPRs(); loadOwnPRs(); loadAutoScore(); });
el.readyOnly.addEventListener('change',   () => { state.readyOnly   = el.readyOnly.checked;   updateURL(); renderList(); });
el.showIgnored.addEventListener('change', () => { state.showIgnored = el.showIgnored.checked; updateURL(); renderList(); });

setInterval(() => {
  if (state.lastUpdated) el.lastUpdated.textContent = `Updated ${timeAgo(state.lastUpdated)}`;
}, 30000);

// Refresh every 1 min while tab is visible
setInterval(() => {
  if (state.token && !state.loading && !document.hidden) { loadPRs(); loadOwnPRs(); }
}, 3 * 60 * 1000);

// Refresh on tab focus if it's been more than 1 min since last update
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && state.token && !state.loading) {
    if (!state.lastUpdated || Date.now() - state.lastUpdated > 3 * 60 * 1000) {
      loadPRs(); loadOwnPRs();
    }
  }
});

// ── Tooltip ──────────────────────────────────────────────────

const tip = document.getElementById('tip');
let tipTimer;

document.addEventListener('mouseover', e => {
  const target = e.target.closest('[data-tip]');
  if (!target) return;
  clearTimeout(tipTimer);
  tip.textContent = target.dataset.tip;
  tip.classList.add('visible');
  moveTip(e);
});

document.addEventListener('mousemove', e => {
  if (tip.classList.contains('visible')) moveTip(e);
});

document.addEventListener('mouseout', e => {
  if (!e.target.closest('[data-tip]')) return;
  clearTimeout(tipTimer);
  tip.classList.remove('visible');
});

function moveTip(e) {
  const pad = 10;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  if (x + tip.offsetWidth  > window.innerWidth)  x = e.clientX - tip.offsetWidth  - pad;
  if (y + tip.offsetHeight > window.innerHeight) y = e.clientY - tip.offsetHeight - pad;
  tip.style.left = x + 'px';
  tip.style.top  = y + 'px';
}


// ── Init ─────────────────────────────────────────────────────

readURL();
el.readyOnly.checked   = state.readyOnly;
el.showIgnored.checked = state.showIgnored;
renderScore();

if (state.token) {
  el.authSection.classList.add('hidden');
  if (state.me && !state.meAvatar) {
    apiFetch(`${API}/user`).then(u => {
      state.meAvatar = u.avatar_url || '';
      localStorage.setItem('prq_me_avatar', state.meAvatar);
    }).catch(() => {});
  }
  if (state.me) {
    el.loggedUser.textContent = '@' + state.me;
    el.loggedUser.classList.remove('hidden');
    el.signoutBtn.classList.remove('hidden');
    loadPRs();
    loadOwnPRs();
    loadAutoScore();
  } else {
    // Token guardado pero sin login — inferirlo ahora
    apiFetch(`${API}/user`).then(user => {
      state.me = user.login;
      localStorage.setItem('prq_me', state.me);
      el.loggedUser.textContent = '@' + state.me;
      el.loggedUser.classList.remove('hidden');
      el.signoutBtn.classList.remove('hidden');
      loadPRs();
      loadOwnPRs();
      loadAutoScore();
    }).catch(() => { loadPRs(); });
  }
}
</script>
